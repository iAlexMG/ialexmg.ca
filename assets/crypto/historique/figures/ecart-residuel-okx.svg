<text x="76" y="56" font-size="12.5" fill="#c3c2b7" text-anchor="start">Minutes (sur 1 440 par jour) dont la chandelle 1 m diffère entre les deux voies — clôtures corrélées à r = 1 − 4×10⁻⁸ partout</text>
<text x="68" y="370.0" font-size="11" fill="#898781" text-anchor="end">0</text>
<line x1="76" y1="96.0" x2="896" y2="96.0" stroke="#21262d"/>
