<text x="92" y="79" font-size="12" fill="#ffffff" text-anchor="start">open/close seuls — ordre des trades au sein d’une même milliseconde (mêmes trades)</text>
<circle cx="671" cy="75" r="5" fill="#9085e9"/>
<text x="682" y="79" font-size="12" fill="#ffffff" text-anchor="start">vraie divergence (volume / nb de trades)</text>
<text x="76" y="430" font-size="11.5" fill="#c3c2b7" text-anchor="start">Lecture : la voie A conserve l’ordre officiel des trade_id ; la voie B n’a que l’horodatage milliseconde.</text>
<text x="76" y="446" font-size="11.5" fill="#c3c2b7" text-anchor="start">Quand plusieurs trades partagent la même milliseconde, l’open/close de la minute peut différer — les prix, eux, sont identiques.</text>
