<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 470" font-family="system-ui,-apple-system,'Segoe UI',sans-serif" role="img" aria-label="L’écart de clôture entre les deux voies Bitget">
<rect width="920" height="470" fill="#0d1117"/>
<text x="76" y="34" font-size="19" fill="#ffffff" text-anchor="start" font-weight="600">L’écart entre les deux historiques, minute par minute</text>
<text x="76" y="56" font-size="12.5" fill="#c3c2b7" text-anchor="start">Clôture voie B − clôture voie A ($), chaque minute des quarante jours — même résolution que la vue d’ensemble</text>
<line x1="76.0" y1="186.0" x2="896.0" y2="186.0" stroke="#21262d"/>
<text x="68.0" y="190.0" font-size="11" fill="#898781" text-anchor="end">+0,2 $</text>
<line x1="76.0" y1="306.0" x2="896.0" y2="306.0" stroke="#21262d"/>
<text x="68.0" y="310.0" font-size="11" fill="#898781" text-anchor="end">−0,2 $</text>
<line x1="76.0" y1="126.0" x2="896.0" y2="126.0" stroke="#21262d"/>
<text x="68.0" y="130.0" font-size="11" fill="#898781" text-anchor="end">+0,4 $</text>
<line x1="76.0" y1="366.0" x2="896.0" y2="366.0" stroke="#21262d"/>
<text x="68.0" y="370.0" font-size="11" fill="#898781" text-anchor="end">−0,4 $</text>
<line x1="76.0" y1="246.0" x2="896.0" y2="246.0" stroke="#383835" stroke-width="1.2"/>
<text x="68.0" y="250.0" font-size="11" fill="#898781" text-anchor="end">0</text>
<polyline points="76.0,246.0 896.0,246.0" fill="none" stroke="#199e70" stroke-width="1.6"/>
<text x="486" y="200" font-size="26" fill="#ffffff" text-anchor="middle" font-weight="600">0,00 $</text>
<text x="486" y="228" font-size="14" fill="#c3c2b7" text-anchor="middle">l’écart est nul du premier au dernier point — les deux voies coïncident exactement</text>
<text x="76.0" y="418" font-size="11" fill="#898781" text-anchor="middle">1er juin</text>
<text x="219.5" y="418" font-size="11" fill="#898781" text-anchor="middle">8 juin</text>
<text x="363.0" y="418" font-size="11" fill="#898781" text-anchor="middle">15 juin</text>
<text x="506.5" y="418" font-size="11" fill="#898781" text-anchor="middle">22 juin</text>
<text x="650.0" y="418" font-size="11" fill="#898781" text-anchor="middle">29 juin</text>
<text x="793.5" y="418" font-size="11" fill="#898781" text-anchor="middle">6 juil.</text>
<text x="875.5" y="418" font-size="11" fill="#898781" text-anchor="middle">10 juil.</text>
</svg>
