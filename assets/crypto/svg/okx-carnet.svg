<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 240" role="img" aria-label="Initialisation du carnet"><defs><marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#7b61ff"/></marker></defs><rect x="0" y="0" width="760" height="240" rx="14" fill="#0b0e14"/><g transform="translate(40,60)"><rect x="0" y="0" width="190" height="102" rx="10" fill="#161b27" stroke="#2e3850"/><rect x="0" y="0" width="190" height="3" rx="2" fill="#7b61ff"/><text x="14" y="26" fill="#e6edf3" font-family="monospace" font-size="13" font-weight="700">1 · Snapshot</text><text x="14" y="48" fill="#9aa7b8" font-family="monospace" font-size="11">WebSocket action=snapshot</text><text x="14" y="64" fill="#9aa7b8" font-family="monospace" font-size="11">(books, 400 niveaux) → reset</text></g><g transform="translate(290,60)"><rect x="0" y="0" width="190" height="102" rx="10" fill="#161b27" stroke="#2e3850"/><rect x="0" y="0" width="190" height="3" rx="2" fill="#7b61ff"/><text x="14" y="26" fill="#e6edf3" font-family="monospace" font-size="13" font-weight="700">2 · Updates</text><text x="14" y="48" fill="#9aa7b8" font-family="monospace" font-size="11">WebSocket action=update</text><text x="14" y="64" fill="#9aa7b8" font-family="monospace" font-size="11">(taille 0 = suppression)</text></g><g transform="translate(540,60)"><rect x="0" y="0" width="190" height="118" rx="10" fill="#161b27" stroke="#2e3850"/><rect x="0" y="0" width="190" height="3" rx="2" fill="#7b61ff"/><text x="14" y="26" fill="#e6edf3" font-family="monospace" font-size="13" font-weight="700">3 · Intégrité</text><text x="14" y="48" fill="#9aa7b8" font-family="monospace" font-size="11">Chaînage seqId/prevSeqId</text><text x="14" y="64" fill="#9aa7b8" font-family="monospace" font-size="11">(prevSeqId == dernier seqId),</text><text x="14" y="80" fill="#9aa7b8" font-family="monospace" font-size="11">sinon resync</text></g><line x1="230" y1="100" x2="285" y2="100" stroke="#7b61ff" stroke-width="2" marker-end="url(#ar)"/><line x1="480" y1="100" x2="535" y2="100" stroke="#7b61ff" stroke-width="2" marker-end="url(#ar)"/></svg>