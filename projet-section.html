<!DOCTYPE html>
<!--
  projet-section.html — Vue générique d'UNE section d'un projet.
  Le projet et la section viennent de l'URL : ?p=<projet>&s=<section>
  (ex. projet-section.html?p=649&s=phase2). Titre, intro, lien retour et
  contenu sont remplis par js/content.js (rendreSection). Une section marquée
  "sousMenu" affiche un sous-menu (une carte par item) ; sinon ses figures +
  son texte détaillé. Une seule page dessert toutes les sections de tous les
  projets — pas de duplication.
-->
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iAlexMG</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body data-page="projet-649">
  <header class="entete" id="entete"></header>

  <main>
    <section class="entete-page">
      <div class="conteneur">
        <nav class="fil-ariane" data-fil-ariane aria-label="Fil d'Ariane"></nav>
        <h1 data-section-titre></h1>
        <p class="accroche" data-section-intro></p>
      </div>
    </section>

    <section class="section" style="padding-top:0;">
      <div class="conteneur">
        <!-- Le projet vient de ?p= ; data-page-section sert aux cartes d'un
             sous-hub imbriqué, data-page-item à la page feuille. -->
        <div data-projet-section data-page-section="projet-section.html" data-page-item="projet-item.html"></div>
      </div>
    </section>
  </main>

  <footer class="pied" id="pied"></footer>

  <script src="js/translations.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/projects.js"></script>
  <script src="js/components.js"></script>
  <script src="js/content.js"></script>
  <script src="js/lightbox.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
