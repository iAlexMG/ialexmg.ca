<!DOCTYPE html>
<!--
  index.html — Page d'accueil
  Présente la marque iAlexMG et donne accès aux portfolios.
  Les textes sont gérés via data-i18n (voir js/translations.js).
-->
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iAlexMG</title>
  <meta name="description" content="Portfolio iAlexMG, organisé par projet : 649, Formation Python, Crypto et Quantower.">
  <link rel="stylesheet" href="css/styles.css">
</head>
<!-- data-page : indique l'onglet actif dans la navigation -->
<body data-page="accueil">
  <header class="entete" id="entete"></header>

  <main>
    <!-- Section d'accueil -->
    <section class="hero">
      <div class="conteneur">
        <p class="sous-titre" data-i18n="accueil.sous_titre"></p>
        <h1 data-i18n="accueil.titre"></h1>
        <p class="intro" data-i18n="accueil.intro"></p>
      </div>
    </section>

    <!-- Grille des projets : générée par js/components.js depuis js/projects.js -->
    <section class="section section-doux" id="projets">
      <div class="conteneur">
        <h2 data-i18n="accueil.projets_titre"></h2>
        <div class="grille-portfolios" data-grille-projets></div>
      </div>
    </section>
  </main>

  <footer class="pied" id="pied"></footer>

  <!-- Scripts : ordre important (traductions -> i18n -> projets -> composants -> init) -->
  <script src="js/translations.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/projects.js"></script>
  <script src="js/components.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
