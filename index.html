<!DOCTYPE html>
<!--
  index.html — Page d'accueil
  Présente la marque iAlexMG et donne accès aux portfolios.
  Les textes sont gérés via data-i18n (voir js/translations.js).
-->
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iAlexMG — Ingénierie &amp; trading quantitatif</title>
  <meta name="description" content="Portfolio d'ingénierie et de trading quantitatif : deux chaînes complètes — crypto (BTC) et indices boursiers (ES/NQ) — de l'extraction de données à l'orderflow, au backtesting LEAN/vectorbt et à l'automatisation, plus statistiques et formation Python.">
  <link rel="canonical" href="https://ialexmg.ca/">
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <!-- Aperçu de partage (LinkedIn, courriel, réseaux sociaux) -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="iAlexMG">
  <meta property="og:title" content="iAlexMG — Ingénierie &amp; trading quantitatif">
  <meta property="og:description" content="Deux chaînes de trading complètes — crypto (BTC) et indices boursiers (ES/NQ) — de la donnée à l'exécution, plus statistiques et formation Python.">
  <meta property="og:url" content="https://ialexmg.ca/">
  <meta property="og:image" content="https://ialexmg.ca/assets/crypto/affichage/img/Hybride.PNG">
  <meta property="og:locale" content="fr_CA">
  <meta property="og:locale:alternate" content="en_CA">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="stylesheet" href="css/styles.css">
</head>
<!-- data-page : indique l'onglet actif dans la navigation -->
<body data-page="accueil">
  <header class="entete" id="entete"></header>

  <main>
    <!-- Section d'accueil -->
    <section class="hero">
      <div class="conteneur">
        <p class="sous-titre" data-i18n="accueil.sous_titre"></p>
        <h1 data-i18n="accueil.titre"></h1>
        <p class="intro" data-i18n="accueil.intro"></p>
        <!-- Appels à l'action : ancre vers les rangées de projets + contact. -->
        <div class="hero-actions">
          <a class="bouton" href="#projets" data-i18n="accueil.cta_projets"></a>
          <a class="bouton bouton-secondaire" href="contact.html" data-i18n="accueil.cta_contact"></a>
        </div>
        <!-- Les quatre messages au recruteur, en tuiles mono. -->
        <ul class="tuiles">
          <li class="tuile">
            <span class="tuile-titre" data-i18n="accueil.tuile1_titre"></span>
            <span class="tuile-desc" data-i18n="accueil.tuile1_desc"></span>
          </li>
          <li class="tuile">
            <span class="tuile-titre" data-i18n="accueil.tuile2_titre"></span>
            <span class="tuile-desc" data-i18n="accueil.tuile2_desc"></span>
          </li>
          <li class="tuile">
            <span class="tuile-titre" data-i18n="accueil.tuile3_titre"></span>
            <span class="tuile-desc" data-i18n="accueil.tuile3_desc"></span>
          </li>
          <li class="tuile">
            <span class="tuile-titre" data-i18n="accueil.tuile4_titre"></span>
            <span class="tuile-desc" data-i18n="accueil.tuile4_desc"></span>
          </li>
        </ul>
      </div>
    </section>

    <!-- Rangées de projet : générées par js/components.js depuis js/projects.js.
         Pleine largeur, capture d'un côté et texte de l'autre, en alternance ;
         un en-tête de groupe coiffe les deux rangées trading. -->
    <section class="section" id="projets">
      <div class="conteneur">
        <h2 data-i18n="accueil.projets_titre"></h2>
        <div class="rangees-projets" data-rangees-projets></div>
      </div>
    </section>
  </main>

  <footer class="pied" id="pied"></footer>

  <!-- Scripts : ordre important (traductions -> i18n -> projets -> composants -> init) -->
  <script src="js/translations.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/projects.js"></script>
  <script src="js/components.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
