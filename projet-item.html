<!DOCTYPE html>
<!--
  projet-item.html — Vue générique d'UNE feuille (item) d'un projet.
  L'item vient de l'URL : ?p=<projet>&s=<section>&i=<item>
  (s est optionnel pour les projets à items plats, ex. Python :
  projet-item.html?p=python&i=py-1). Titre, intro, lien retour et contenu sont
  remplis par js/content.js (rendreItem) : figure en grand OU visionneuse PDF,
  suivie du texte détaillé. Une seule page dessert tous les items.
-->
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iAlexMG</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body data-page="projet-649">
  <header class="entete" id="entete"></header>

  <main>
    <section class="entete-page">
      <div class="conteneur">
        <nav class="fil-ariane" data-fil-ariane aria-label="Fil d'Ariane"></nav>
        <h1 data-section-titre></h1>
        <p class="accroche" data-section-intro></p>
      </div>
    </section>

    <section class="section" style="padding-top:0;">
      <div class="conteneur">
        <!-- Le projet vient de ?p= ; data-page-section sert au lien retour. -->
        <div data-projet-item data-page-section="projet-section.html"></div>
      </div>
    </section>
  </main>

  <footer class="pied" id="pied"></footer>

  <script src="js/translations.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/projects.js"></script>
  <script src="js/components.js"></script>
  <script src="js/content.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
